<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>psych0 construct</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        cursor: pointer;
        z-index: 10;
        transition: transform 1s ease-in;
    }

    .fall {
        transform: translateY(120%);
    }

    #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    .img {
        position: absolute;
        width: 40px;
        height: 40px;
        pointer-events: auto;
    }
</style>
</head>
<body>

<div id="overlay">Нажми</div>
<audio id="music" src="music.mp3"></audio>
<canvas id="canvas"></canvas>

<script>
const overlay = document.getElementById('overlay');
const music = document.getElementById('music');
let started = false;

overlay.addEventListener('click', () => {
    if (started) return;
    started = true;

    music.play();

    // Анимация "разбития" (4 секунды)
    overlay.innerText = "";
    overlay.style.background = "white";
    overlay.style.transition = "opacity 4s linear";
    overlay.style.opacity = "0";

    setTimeout(() => {
        overlay.classList.add('fall');
    }, 4000);

    // Курсор
    document.body.style.cursor = "url('cursor.png'), auto";

    // Запуск картинок
    spawnImages();
});

function spawnImages() {
    const images = ['img1.png','img2.png','img3.png'];

    setInterval(() => {
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random()*images.length)];
        img.className = 'img';

        img.style.left = Math.random()*window.innerWidth + 'px';
        img.style.top = Math.random()*window.innerHeight + 'px';

        document.body.appendChild(img);

        const vx = (Math.random()-0.5)*4;
        const vy = (Math.random()-0.5)*4;

        function move() {
            let x = img.offsetLeft + vx;
            let y = img.offsetTop + vy;

            if (x < 0 || x > window.innerWidth) return img.remove();
            if (y < 0 || y > window.innerHeight) return img.remove();

            img.style.left = x + 'px';
            img.style.top = y + 'px';

            requestAnimationFrame(move);
        }
        move();

        img.addEventListener('mouseenter', () => {
            img.remove();
            toggleBackground();
        });

    }, 200);
}

let dark = false;
function toggleBackground() {
    dark = !dark;
    document.body.style.background = dark ? 'black' : 'white';
}

// Закрытие сайта при окончании музыки
music.addEventListener('ended', () => {
    document.body.innerHTML = "<h1>404 ERROR</h1>";
});
</script>

</body>
</html>
