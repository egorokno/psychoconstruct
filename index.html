<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aw, Snap!</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: white;
    }

    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        cursor: pointer;
        z-index: 10;
        transition: opacity 4s linear, transform 1s ease-in;
    }

    .fall {
        transform: translateY(120%);
    }

    .img {
        position: absolute;
        width: 40px;
        height: 40px;
        pointer-events: auto;
    }
</style>
</head>
<body>

<div id="overlay">Click</div>
<audio id="music" src="music.mp3"></audio>

<script>
const overlay = document.getElementById('overlay');
const music = document.getElementById('music');
let started = false;

// START
overlay.addEventListener('click', () => {
    if (started) return;
    started = true;

    music.play();

    // "glass break" fade (4 seconds)
    overlay.innerText = "";
    overlay.style.opacity = "0";

    setTimeout(() => {
        overlay.classList.add('fall');
    }, 4000);

    // custom cursor
    document.body.style.cursor = "url('cursor.png'), auto";

    spawnImages();
});

// IMAGES
function spawnImages() {
    const images = ['img1.png','img2.png','img3.png'];

    setInterval(() => {
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random()*images.length)];
        img.className = 'img';

        img.style.left = Math.random()*window.innerWidth + 'px';
        img.style.top = Math.random()*window.innerHeight + 'px';

        document.body.appendChild(img);

        const vx = (Math.random()-0.5)*6;
        const vy = (Math.random()-0.5)*6;

        function move() {
            let x = img.offsetLeft + vx;
            let y = img.offsetTop + vy;

            if (x < 0 || x > window.innerWidth) return img.remove();
            if (y < 0 || y > window.innerHeight) return img.remove();

            img.style.left = x + 'px';
            img.style.top = y + 'px';

            requestAnimationFrame(move);
        }
        move();

        img.addEventListener('mouseenter', () => {
            img.remove();
            toggleBackground();
        });

    }, 150);
}

// BACKGROUND TOGGLE
let dark = false;
function toggleBackground() {
    dark = !dark;
    document.body.style.background = dark ? 'black' : 'white';
}

// CHROME CRASH SCREEN
music.addEventListener('ended', () => {
    document.body.innerHTML = `
    <div style="
        font-family: Arial, sans-serif;
        padding: 40px;
        color: #202124;
        background: #fff;
        height: 100vh;
    ">
        <h1 style="font-size:48px; margin-bottom:10px;">Aw, Snap!</h1>
        <p style="font-size:18px; max-width:600px;">
            Something went wrong while displaying this webpage.
        </p>
        <p style="font-size:14px; color:gray;">
            Error code: STATUS_ACCESS_VIOLATION
        </p>
    </div>
    `;

    // freeze tab (fake crash)
    setTimeout(() => {
        while(true) {}
    }, 1500);
});
</script>

</body>
</html>
